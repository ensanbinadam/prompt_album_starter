<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة البرومبتات اليدوية</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>مكتبة البرومبتات اليدوية</h1>
      <p>نظام واحد يجمع البرومبتات اليدوية داخل معرض منظم مع متغيرات ونسخ فوري.</p>
    </div>
    <div class="actions">
      <input id="globalSearch" type="search" placeholder="ابحث باسم النموذج أو التصنيف..." />
    </div>
  </header>

  <main class="layout">
    <aside class="gallery-panel">
      <div class="gallery-head">
        <h2>النماذج</h2>
        <span id="promptCount"></span>
      </div>
      <div id="categoryTabs" class="tabs"></div>
      <div id="gallery" class="gallery"></div>
    </aside>

    <section class="editor-panel">
      <div id="emptyState" class="empty-state">
        <h2>اختر نموذجًا من اليسار</h2>
        <p>ستظهر الصورة والوصف والمتغيرات وزر التوليد والنسخ هنا.</p>
      </div>

      <article id="detailView" class="detail hidden">
        <div class="detail-top">
          <img id="detailImage" alt="معاينة النموذج" />
          <div class="detail-meta">
            <span id="detailCategory" class="badge"></span>
            <h2 id="detailTitle"></h2>
            <p id="detailDescription"></p>
            <div class="mini-actions">
              <button id="copyTemplateBtn" class="secondary">نسخ القالب الأصلي</button>
              <button id="copyGeneratedBtn">نسخ البرومبت الناتج</button>
            </div>
          </div>
        </div>

        <div class="grid-two">
          <div class="card">
            <h3>المتغيرات</h3>
            <form id="variablesForm" class="form"></form>
            <div class="submit-row">
              <button id="generateBtn" type="button">توليد البرومبت</button>
              <button id="resetBtn" class="secondary" type="button">إعادة المتغيرات</button>
            </div>
          </div>

          <div class="card">
            <h3>البرومبت الناتج</h3>
            <textarea id="output" rows="22" spellcheck="false"></textarea>
          </div>
        </div>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>تصميم أولي لمكتبة برومبتات يدوية قابلة للتوسع، مناسب للنشر على GitHub Pages.</p>
  </footer>

  <script src="prompts.js"></script>
  <script src="app.js"></script>
</body>
</html>
